# Event definitions based on https://github.com/edger477/funscript-tools
# Credits: edger477, AquariumParrot (MCB and Clutch events)
#
# Each event is a sequence of fundamental operations (apply_modulation / apply_linear_change)
# that modulate axes over a duration.  When loaded in restim they become looping patterns.

# Axis normalization settings
normalization:
  pulse_frequency:
    max: 120.0
    unit: "Hz"
  pulse_width:
    max: 100.0
    unit: "%"
  frequency:
    max: 1200.0
    unit: "Hz"
  volume:
    max: 1.0
    unit: "normalized"

# Event groups
groups:
  - name: "General"
    prefix: ""
    description: "General-purpose events"

  - name: "MCB (credit: AquariumParrot)"
    prefix: "mcb_"
    description: "Events reverse-engineered from the Mistress and Control Box"

  - name: "Clutch (credit: AquariumParrot)"
    prefix: "clutch_"
    description: "Events reverse-engineered from the Clutch hypno-estim project"

  - name: "Test events - use with care"
    prefix: "test_"
    description: "Events for testing features"

definitions:

  # =========================================================================
  #  General events
  # =========================================================================

  edge:
    default_params:
      duration_ms: 15000
      buzz_freq: 60
      buzz_intensity: 0.1
      volume_boost: 0.03
      ramp_up_ms: 250

    steps:
      - operation: apply_linear_change
        axis: pulse_frequency
        params:
          start_value: 10
          end_value: 20
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_up_ms
          mode: additive

      - operation: apply_modulation
        axis: volume,volume-prostate
        params:
          waveform: sin
          frequency: $buzz_freq
          amplitude: $buzz_intensity
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_up_ms
          max_level_offset: $volume_boost
          mode: additive

      - operation: apply_modulation
        axis: pulse_width
        params:
          waveform: sin
          frequency: 3
          amplitude: 0.5
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_up_ms
          mode: additive

  ruin:
    default_params:
      duration_ms: 30000
      buzz_freq: 5
      buzz_intensity: 0.1
      volume_boost: 0.03
      ramp_in_ms: 10000

    steps:
      - operation: apply_linear_change
        axis: volume
        params:
          start_value: 0
          end_value: 0
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_in_ms
          ramp_out_ms: 500
          mode: overwrite

      - operation: apply_modulation
        axis: volume-prostate
        params:
          waveform: sin
          frequency: $buzz_freq
          amplitude: $buzz_intensity
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_in_ms
          max_level_offset: $volume_boost
          mode: additive

      - operation: apply_modulation
        axis: pulse_width
        params:
          waveform: sin
          frequency: 3
          amplitude: 0.5
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_in_ms
          mode: additive

  tranquil:
    default_params:
      duration_ms: 20000
      osc_freq: 15
      osc_amplitude: 0.5
      max_volume: -0.01

    steps:
      - operation: apply_modulation
        axis: volume,volume-prostate
        params:
          waveform: sin
          frequency: $osc_freq
          amplitude: $osc_amplitude
          max_level_offset: $max_volume
          duration_ms: $duration_ms
          ramp_in_ms: 1000
          ramp_out_ms: 1000
          mode: additive

  # =========================================================================
  #  Test events
  # =========================================================================

  test_slaps:
    default_params:
      duration_ms: 3000
      max_volume_increase: 0.2
      prostate_volume_increase: 0.1
      amplitude: 0.6
      frequency: 1
      ramp_ms: 500

    steps:
      - operation: apply_modulation
        axis: volume
        params:
          waveform: square
          duty_cycle: 0.05
          frequency: $frequency
          amplitude: $amplitude
          max_level_offset: $max_volume_increase
          duration_ms: $duration_ms
          ramp_in_ms: 0
          ramp_out_ms: 0
          mode: additive

      - operation: apply_linear_change
        axis: volume-prostate
        params:
          start_value: $prostate_volume_increase
          end_value: $prostate_volume_increase
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive

