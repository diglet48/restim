# Event definitions based on https://github.com/edger477/funscript-tools
# Credits: edger477, AquariumParrot (MCB and Clutch events)
#
# Each event is a sequence of fundamental operations (apply_modulation / apply_linear_change)
# that modulate axes over a duration.  When loaded in restim they become looping patterns.

# All axis values are stored as TCode 0-1 (extended axes) or -1..+1 (alpha/beta).
# Kit limits in restim remap TCode to the user's configured ranges.

# Event groups
groups:
  - name: "MCB (credit: AquariumParrot)"
    prefix: "mcb_"
    description: "Events reverse-engineered from the Mistress and Control Box"
    match_prefixes:
      - "mcb_edge"
      - "mcb_obey"

  - name: "MCB Scenes (credit: AquariumParrot)"
    prefix: "mcb_goodboy_,mcb_submit_,mcb_obey_"
    description: "goodBoy/submit/obey with motion from original SC script scenes"
    match_prefixes:
      - "mcb_goodboy_"
      - "mcb_submit_"
      - "mcb_obey_2"

  - name: "Clutch Scenes (credit: AquariumParrot)"
    prefix: "clutch_"
    description: "Events from the Clutch project with motion from original SC script"

definitions:
  # =========================================================================
  #  Mistress & Control Box events (credit: AquariumParrot)
  #  Funscript keyframes extracted from SuperCollider script timestamps.
  #  Each event replays the actual funscript data for its duration.
