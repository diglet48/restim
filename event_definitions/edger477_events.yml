# Event definitions based on https://github.com/edger477/funscript-tools
# Credits: edger477, AquariumParrot (MCB and Clutch events)
#
# Each event is a sequence of fundamental operations (apply_modulation / apply_linear_change)
# that modulate axes over a duration.  When loaded in restim they become looping patterns.

# Axis normalization settings
normalization:
  pulse_frequency:
    max: 120.0
    unit: "Hz"
  pulse_width:
    max: 100.0
    unit: "%"
  frequency:
    max: 1200.0
    unit: "Hz"
  volume:
    max: 1.0
    unit: "normalized"

# Event groups
groups:
  - name: "MCB (credit: AquariumParrot)"
    prefix: "mcb_"
    description: "Events reverse-engineered from the Mistress and Control Box"
    match_prefixes:
      - "mcb_edge"
      - "mcb_obey"

  - name: "MCB Scenes (credit: AquariumParrot)"
    prefix: "mcb_goodboy_,mcb_submit_,mcb_obey_"
    description: "goodBoy/submit/obey with motion from original SC script scenes"
    match_prefixes:
      - "mcb_goodboy_"
      - "mcb_submit_"
      - "mcb_obey_2"

  - name: "Clutch Scenes (credit: AquariumParrot)"
    prefix: "clutch_"
    description: "Events from the Clutch project with motion from original SC script"

definitions:
  # =========================================================================
  #  MCB events (credit: AquariumParrot)
  # =========================================================================

  mcb_edge:
    default_params:
      duration_ms: 18000
      pulse_rate: 100
      alpha_freq: 8
      alpha_amplitude: 0.35
      alpha_offset: 0.55
      beta_freq: 0.5
      beta_amplitude: 0.7
      mod_freq: 9
      mod_amplitude: 0.35
      intensity: 0.02
      ramp_ms: 6000

    steps:
      - operation: apply_linear_change
        axis: pulse_frequency
        params:
          start_value: $pulse_rate
          end_value: $pulse_rate
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: overwrite

      - operation: apply_modulation
        axis: alpha
        params:
          waveform: sin
          frequency: $alpha_freq
          amplitude: $alpha_amplitude
          max_level_offset: $alpha_offset
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive

      - operation: apply_modulation
        axis: beta
        params:
          waveform: sin
          frequency: $beta_freq
          amplitude: $beta_amplitude
          max_level_offset: 0
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive

      - operation: apply_modulation
        axis: volume,volume-prostate
        params:
          waveform: sin
          frequency: $mod_freq
          amplitude: $mod_amplitude
          max_level_offset: $intensity
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive

  mcb_edge_ce:
    default_params:
      volume: 0.05
      duration_ms: 15000
      pulse_rate: 160
      alpha_freq: 7
      alpha_amplitude: 0.85
      beta_freq: 4
      beta_amplitude: 0.8
      beta_phase: 90
      ramp_ms: 1500

    steps:
      - operation: apply_linear_change
        axis: volume,volume-prostate
        params:
          start_value: $volume
          end_value: $volume
          duration_ms: $duration_ms
          ramp_in_ms: $ramp_ms
          ramp_out_ms: $ramp_ms
          mode: additive

      - operation: apply_linear_change
        axis: pulse_frequency
